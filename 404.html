<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden | Lukas Müller</title>
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-text: #ffffff;
      --color-accent: #00d4ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-container {
      text-align: center;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.8;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .error-text {
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      text-decoration: none;
      border-radius: 0.25rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn:hover {
      background: var(--color-accent);
      color: var(--color-bg);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Seite nicht gefunden</h1>
    <p class="error-text">Die gesuchte Seite existiert nicht.</p>
    <a href="/" class="btn">← Zurück zur Startseite</a>
  </div>
</body>
</html>
